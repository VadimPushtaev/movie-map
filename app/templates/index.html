<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Map</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <main class="layout">
      <section class="map-panel" aria-label="World movie map">
        <div class="map-shell" data-map-shell>
          <div class="map-controls" aria-label="Map zoom controls">
            <button type="button" data-zoom-in aria-label="Zoom in" title="Zoom in">+</button>
            <button type="button" data-zoom-out aria-label="Zoom out" title="Zoom out">-</button>
            <button type="button" data-zoom-reset aria-label="Reset zoom" title="Reset zoom">Reset</button>
          </div>
          {{ map_svg }}
        </div>
      </section>

      <aside class="movie-panel" data-movie-panel aria-live="polite">
        <img data-panel-image alt="">
        <div class="movie-copy">
          <p data-panel-country></p>
          <h1 data-panel-title>Select a movie country</h1>
          <a data-panel-imdb rel="noreferrer" target="_blank">IMDb</a>
        </div>
      </aside>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
