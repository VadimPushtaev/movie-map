<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Map</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <main class="layout">
      <section class="map-panel" aria-label="World movie map">
        {{ map_svg }}
      </section>

      <aside class="movie-panel" data-movie-panel hidden aria-live="polite">
        <button class="panel-close" type="button" data-panel-close aria-label="Close movie details">&times;</button>
        <img data-panel-image alt="">
        <div class="movie-copy">
          <p data-panel-country></p>
          <h1 data-panel-title></h1>
          <a data-panel-imdb rel="noreferrer" target="_blank">IMDb</a>
        </div>
      </aside>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
